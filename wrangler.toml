# ================================================
#  ANIMEHUNT BACKEND — Wrangler Config
#  File: wrangler.toml
#  Cloudflare Workers
# ================================================

name = "animehunt-backend"
main = "src/index.js"

compatibility_date  = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ================= DATABASE (Primary — Cloudflare D1) =================

[[d1_databases]]
binding       = "DB"
database_name = "animehunt"
database_id   = "95a1ed03-67a0-46e4-b82c-d153f4c6b8e3"

# ================= KV NAMESPACE =================

[[kv_namespaces]]
binding = "KV"
id      = "ea8c692f1cf94fcfb4cd3bcfa6fa29cc"

# ================= ENV VARIABLES =================

[vars]

ENVIRONMENT           = "production"
ALLOWED_ORIGINS       = "https://animehunt.in,https://www.animehunt.in,https://admin.animehunt.in"

# 🖼️ ImageKit (Public)
IMAGEKIT_PUBLIC_KEY   = "public_29SqhkCUDesPjYpcKrAS5aFuSkc="
IMAGEKIT_URL_ENDPOINT = "https://ik.imagekit.io/av2cevzsyi"

# 🗄️ Turso — Replica DB URL
TURSO_URL = "libsql://animehunt-animehunt1.aws-ap-south-1.turso.io"

# 🗄️ Supabase — URL only
SUPABASE_URL = "https://ahuwijnulrqsrdnzphds.supabase.co"

# ================= CRON =================

[triggers]
crons = ["*/5 * * * *"]
